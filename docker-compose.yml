services:
  repo-wiki:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-7654}:${API_PORT:-7654}"
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    volumes:
      - repo_wiki_data:/app/.indexer
      - repo_wiki_wiki:/app/wiki
      - repo_wiki_repos:/tmp/repo_wiki_repos
      - ./.env:/app/.env:ro
    environment:
      - API_PORT=${API_PORT:-7654}
      - MCP_ENABLED=${MCP_ENABLED:-false}
      - MCP_PORT=${MCP_PORT:-8000}
      - REPO_WIKI_API_KEY=${REPO_WIKI_API_KEY:-}
    restart: unless-stopped

volumes:
  repo_wiki_data:
  repo_wiki_wiki:
  repo_wiki_repos:
