services:
  repo-wiki:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7654:7654"
    volumes:
      - repo_wiki_data:/app/.indexer
      - repo_wiki_wiki:/app/wiki
      - repo_wiki_repos:/tmp/repo_wiki_repos
      - ./.env:/app/.env:ro
    environment:
      - REPO_WIKI_API_KEY=${REPO_WIKI_API_KEY:-}
    restart: unless-stopped

volumes:
  repo_wiki_data:
  repo_wiki_wiki:
  repo_wiki_repos:
